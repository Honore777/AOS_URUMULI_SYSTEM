<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>
<body class="bg-slate-100 min-h-screen p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex items-center justify-between">
            <h1 class="text-2xl font-bold text-slate-800">Loan Ledger (All Lenders)</h1>
            <a href="{{ url_for('core.boss_dashboard') }}" class="rounded bg-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-300">Boss Dashboard</a>
        </div>

        <div class="rounded-xl bg-white p-6 shadow-lg border border-slate-200">
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-slate-100 text-slate-700">
                        <tr>
                            <th class="px-3 py-2 text-left font-semibold">Lender</th>
                            <th class="px-3 py-2 text-left font-semibold">Status</th>
                            <th class="px-3 py-2 text-right font-semibold">Principal (RWF)</th>
                            <th class="px-3 py-2 text-right font-semibold">Outstanding (RWF)</th>
                            <th class="px-3 py-2"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200">
                        {% for l in loans %}
                        <tr class="hover:bg-slate-50">
                            <td class="px-3 py-2 font-semibold text-slate-900">{{ l.lender_name }}</td>
                            <td class="px-3 py-2 text-slate-700">{{ l.status }}</td>
                            <td class="px-3 py-2 text-right text-slate-700">{{ '{:,.2f}'.format(l.principal_rwf or 0) }}</td>
                            <td class="px-3 py-2 text-right font-bold text-slate-900">{{ '{:,.2f}'.format(l.outstanding_rwf or 0) }}</td>
                            <td class="px-3 py-2 text-right">
                                <a class="rounded border border-slate-300 px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-100" href="{{ url_for('core.boss_loan_detail', loan_id=l.id) }}">View</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
